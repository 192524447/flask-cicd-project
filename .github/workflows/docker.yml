name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t flaskapp .

      - name: Test Build
        run: echo "Build Successful"

      - name: Deployment
        run: echo "Application Deployed Successfully"
